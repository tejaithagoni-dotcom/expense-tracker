<!DOCTYPE html>
<html>

<head>
<title>Edit Expense</title>
<link rel="stylesheet" href="/static/style.css">
</head>


<body>

<div class="container">

<h1>Edit Expense</h1>


<form method="POST">

<input 
type="number" 
name="amount" 
value="{{expense.amount}}"
required>


<input 
type="text" 
name="category" 
value="{{expense.category}}"
required>


<input 
type="date" 
name="date"
value="{{expense.date}}"
required>


<button>
Update Expense
</button>


</form>


</div>

</body>

</html>
